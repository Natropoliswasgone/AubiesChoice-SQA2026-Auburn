# .github/workflows/vv_pipeline.yml
# CFR §117.130 V&V Pipeline with Forensick Audit Trail

name: CFR V&V Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vv-pipeline:
    name: Verification & Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate requirements.json
        run: |
          python scripts/generate_requirements.py \
            -i "Input CFR File/CFR-117.130.md" \
            -o "Input CFR File/requirements.json" \
            -s "Input CFR File/expected_structure.json" \
            -c "21 CFR 117.130" \
            -k HAZ \
            --select \
              REQ-HAZ-001A REQ-HAZ-001C REQ-HAZ-001F \
              REQ-HAZ-002A REQ-HAZ-002D REQ-HAZ-002F \
              REQ-HAZ-003B REQ-HAZ-003C \
              REQ-HAZ-003G REQ-HAZ-003M

      - name: Generate test_cases.json
        run: |
          python scripts/generate_test_cases.py \
            -r "Input CFR File/requirements.json" \
            -s "Input CFR File/expected_structure.json" \
            -o "Input CFR File/test_cases.json" \
            --select \
              REQ-HAZ-001A REQ-HAZ-001C REQ-HAZ-001F \
              REQ-HAZ-002A REQ-HAZ-002D REQ-HAZ-002F \
              REQ-HAZ-003B REQ-HAZ-003C \
              REQ-HAZ-003G REQ-HAZ-003M

      - name: Run verify.py
        id: verify
        run: python scripts/verify.py

      - name: Upload forensick audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forensick-audit-log-${{ github.run_number }}
          path: forensick_log.jsonl
          retention-days: 90

      - name: Print forensick summary
        if: always()
        run: python scripts/forensick.py

      - name: Assert build status
        if: failure()
        run: |
          echo "::error::V&V pipeline FAILED. Download forensick-audit-log artifact for details."
          exit 1
